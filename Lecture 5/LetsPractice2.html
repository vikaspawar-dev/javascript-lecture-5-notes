<body>

    <p>
        <b>Qs.</b> For a given array of numbers, print the square of each value 
        using the <code>forEach()</code> loop.
    </p>

    <pre>
let numbers = [1, 2, 3, 4, 5];

numbers.forEach((num) => {
    console.log(num * num);
});

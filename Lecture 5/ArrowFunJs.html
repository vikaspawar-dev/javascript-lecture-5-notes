<body>

    <h1>Arrow Functions</h1>

    <h2>Definition</h2>

    <div class="code">
const functionName = (param1, param2) => { <br>
&nbsp;&nbsp;// do some work <br>
}
    </div>

    <p>Compact way of writing a function</p>

    <hr>

    <h2>Example</h2>

    <div class="code">

}
